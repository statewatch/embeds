<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Language" content="en" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <script src="https://unpkg.com/d3@7.9.0"></script>
    <style>
      @font-face {
        font-family: Halyard; /* set name */
        font-weight: bold;
        src: url(fonts/halyard-display-medium.woff2); /* url of the font */
      }
      @font-face {
        font-family: Halyard; /* set name */
        font-weight: bold;
        font-style: italic;
        src: url(fonts/halyard-display-medium-italic.woff2); /* url of the font */
      }
      @font-face {
        font-family: Halyard; /* set name */
        src: url(fonts/halyard-text.woff2); /* url of the font */
      }
      body {
        height: 750vh;
        font-family: "Halyard", sans-serif;
      }
      .textbox {
        color: #232222;
        padding: 3px 10px;
        border-radius: 0px;
        max-width: 350px;
        margin-right: 15px;
        margin-bottom: 10px;
      }
      #left_texts .textbox {
        background-image: url(img/lines_1-to-10_30percent.png);
      }
      #right_texts .textbox {
        background-image: none;
        border: 1px dashed #ff3d9d;
        margin-left: auto;
        margin-right: 0;
      }
      span.date {
        background-color: #232222;
        border-radius: 3px;
        color: white;
        font-size: 14px;
        padding: 4px 5px 2px;
      }
      .tick text {
        font-family: "Halyard";
      }
      .year-ticks {
        font-size: 14px;
      }
      .month-ticks {
        font-size: 13px;
      }
      .textbox p {
        margin: 0.5em 0px;
      }
      .textbox a {
        color: inherit;
        text-decoration-color: #ff3d9d;
        text-decoration-thickness: 2px;
      }
      #timeline {
        height: 2000px;
        width: 900px;
        position: relative;
        top: -2000px;
      }
      .tick line {
        stroke: white;
        stroke-width: 4px;
      }
      path.domain {
        display: none;
      }
      #text_wrapper {
        display: flex;
        width: 900px;
        height: 2000px;
      }
      #left_texts,
      #right_texts {
        flex: 1;
      }
    </style>
  </head>

  <body>
    <div id="text_wrapper">
      <div id="left_texts"></div>
      <div id="right_texts"></div>
    </div>
    <svg id="timeline"></svg>
    <script>
      var textbox = document.getElementsByClassName("textbox");
      const svg = d3.select("#timeline");
      const html = document.documentElement;
      const margin = { top: 20, right: 20, bottom: 30, left: 450 };
      const width = 900 - margin.left - margin.right;
      const height = 2000 - margin.top - margin.bottom;
      const leftContainer = d3.select("#left_texts");
      const rightContainer = d3.select("#right_texts");

      var loadedData;

      const y = d3.scaleTime().range([0, height]);

      const x = d3
        .scaleBand()
        .domain([0, 1]) // use index as y-axis
        .range([0, width])
        .padding(0.1);

      const monthNames = [
        "January",
        "February",
        "March",
        "April",
        "May",
        "June",
        "July",
        "August",
        "September",
        "October",
        "November",
        "December",
      ];

      const parseDate = d3.timeParse("%d.%m.%y");
      d3.csv("combined_timeline.csv").then((data) => {
        loadedData = data.map((d) => {
          const date = parseDate(d.date);
          return {
            ...d,
            year: date.getFullYear(),
            month: date.getMonth(),
            day: date.getDate(),
            _dateObj: new Date(
              date.getFullYear(),
              date.getMonth(),
              date.getDate(),
            ),
            cat: (d.cat || "").trim(),
          };
        });

        // Sort ascending by date
        loadedData.sort((a, b) => a._dateObj - b._dateObj);
        updateChart();
      });

      const updateChart = function () {
        y.domain(
          d3.extent(loadedData, (d) => new Date(d.year, d.month, d.day)),
        );
        const g = svg
          .append("g")
          .attr("transform", `translate(${margin.left},${margin.top})`);

        console.log(loadedData);

        g.append("g")
          .attr("class", "x axis")
          .attr("transform", "translate(0, 0)")
          .call(d3.axisLeft(y).ticks(0));

        g.append("line")
          .attr("x1", 0) // Start at this x
          .attr("y1", 0 - margin.top) // Start at the top of the chart
          .attr("x2", 0) // End at the same x
          .attr("y2", height + margin.bottom) // End at the bottom of the chart
          .attr("stroke", "#ff3d9d") // Color of the line
          .attr("stroke-width", 1); // Width of the line

        g.append("line")
          .attr("x1", 15) // Start at this x
          .attr("y1", 0 - margin.top) // Start at the top of the chart
          .attr("x2", 15) // End at the same x
          .attr("y2", height + margin.bottom) // End at the bottom of the chart
          .attr("stroke", "#000") // Color of the line
          .attr("stroke-width", 1); // Width of the line

        const yearTicks = y.ticks(d3.timeYear.every(1));

        // Add year ticks to y-axis
        g.append("g")
          .attr("class", "tick")
          .attr("class", "year-ticks")
          .call(
            d3
              .axisLeft(y)
              .tickValues(yearTicks)
              .tickSize(15)
              .tickFormat(d3.timeFormat("%Y")),
          );

        const firstDataEntryDate = loadedData[0].date;
        g.append("g")
          .attr("class", "tick")
          .attr("class", "year-ticks")
          .call(
            d3
              .axisLeft(y)
              .tickSize(15)
              .tickValues([firstDataEntryDate]) // Use only the specific date
              .tickFormat(() => "2024"), // Custom label
          );

        // Style the tick text
        g.selectAll(".tick").each(function (d) {
          // Select the text element and get its position
          const tick = d3.select(this);
          const text = tick.select("text");

          const bbox = text.node().getBBox(); // Get the bounding box of the text

          // Create a background rectangle
          tick
            .insert("rect", "text")
            .attr("x", bbox.x - 5)
            .attr("y", bbox.y - 3)
            .attr("width", bbox.width + 10)
            .attr("height", bbox.height + 4)
            .attr("fill", "#232222")
            .attr("opacity", "0.1")
            .attr("rx", 2);
        });

        const additionalTicks = [];
        for (let year = 2024; year <= 2026; year++) {
          if (year === 2024) {
            additionalTicks.push(new Date(year, 9, 1));
          } else {
            additionalTicks.push(new Date(year, 3, 1));
            additionalTicks.push(new Date(year, 6, 1));
            additionalTicks.push(new Date(year, 9, 1));
          }
        }

        // Add additional ticks to y-axis
        g.append("g")
          .attr("class", "tick")
          .attr("class", "month-ticks")
          .call(
            d3
              .axisLeft(y)
              .tickSize(10)
              .tickValues(additionalTicks)
              .tickFormat(d3.timeFormat("%B")),
          );

        g.selectAll(".tick").attr("transform", (d) => {
          const yValue = y(d);
          return `translate(2, ${yValue})`;
        });

        const circles = g
          .selectAll(".event")
          .data(loadedData)
          .enter()
          .append("circle")
          .attr("class", "event")
          .attr("cy", (d) => y(new Date(d.year, d.month, d.day)))
          .attr("cx", (d) => (d.cat === "pal_action" ? 15 : 0))
          .attr("r", 4.5)
          .attr("fill", (d) => (d.cat === "pal_action" ? "#222" : "#ff3d9d"))
          .attr("stroke", (d) => (d.cat === "pal_action" ? "#222" : "#ff3d9d"));

        // general -> left
        leftContainer
          .selectAll(".textbox")
          .data(loadedData.filter((d) => (d.cat || "").trim() === "general"))
          .enter()
          .append("div")
          .attr("class", "textbox")
          .html(
            (d) =>
              `<p><span class="date">${d.date_label || d.date || ""}</span></p><p>${d.desc || ""}</p>${d.source ? `<p><a href="${d.source}" target="_blank">Source</a></p>` : ""}`,
          );

        // others -> right
        rightContainer
          .selectAll(".textbox")
          .data(loadedData.filter((d) => (d.cat || "").trim() !== "general"))
          .enter()
          .append("div")
          .attr("class", "textbox")
          .html(
            (d) =>
              `<p><span class="date">${d.date_label || d.date || ""}</span></p><p>${d.desc || ""}</p>${d.source ? `<p><a href="${d.source}" target="_blank">Source</a></p>` : ""}`,
          );
      };
    </script>
  </body>
</html>
